  PASSWORD: behd1d2
  VIRTUAL_HOST: /
  SSL_ENABLED: false
  CONNECTION_TIMEOUT: 30
  PREFETCH_COUNT: 10
  CTF_QUEUE_NAME: ctf_tasks_queue
  CTF_OUT_QUEUE_NAME: ctf_out_tasks_queue
  MOTIONCOR_QUEUE_NAME: motioncor_tasks_queue
  MOTIONCOR_OUT_QUEUE_NAME: motioncor_out_tasks_queue
  MOTIONCOR_TEST_QUEUE_NAME: motioncor_test_inqueue
  MOTIONCOR_TEST_OUT_QUEUE_NAME: motioncor_test_outqueue
  FFT_QUEUE_NAME: fft_tasks_queue
  FFT_OUT_QUEUE_NAME: fft_out_tasks_queue
  SQUARE_DETECTION_QUEUE_NAME: square_detection_tasks_queue
  SQUARE_DETECTION_OUT_QUEUE_NAME: square_detection_out_tasks_queue
  HOLE_DETECTION_QUEUE_NAME: hole_detection_tasks_queue
  HOLE_DETECTION_OUT_QUEUE_NAME: hole_detection_out_tasks_queue
  TOPAZ_PICK_QUEUE_NAME: topaz_pick_tasks_queue
  TOPAZ_PICK_OUT_QUEUE_NAME: topaz_pick_out_tasks_queue
  MICROGRAPH_DENOISE_QUEUE_NAME: micrograph_denoise_tasks_queue
  MICROGRAPH_DENOISE_OUT_QUEUE_NAME: micrograph_denoise_out_tasks_queue
  # In-process result-processor (P3). Each entry binds one out-queue
  # to a category for ImageMetaData stamping + on-disk file routing.
  OUT_QUEUES:
    - name: ctf_out_tasks_queue
      queue_type: ctf
      dir_name: ctf
      category: 2
    - name: motioncor_out_tasks_queue
      queue_type: motioncor
      dir_name: fao
      category: 3
    - name: fft_out_tasks_queue
      queue_type: fft
      dir_name: ffts
      category: 1
    - name: square_detection_out_tasks_queue
      queue_type: square_detection
      dir_name: squares
      category: 6
    - name: hole_detection_out_tasks_queue
      queue_type: hole_detection
      dir_name: holes
      category: 7
    - name: topaz_pick_out_tasks_queue
      queue_type: topaz_pick
      dir_name: topaz_picks
      category: 8
    - name: micrograph_denoise_out_tasks_queue
      queue_type: micrograph_denoise
      dir_name: topaz_denoised
      category: 9
    # 2026-05-04 fix: blocker — extraction + classification results
    # had no consumer and tasks never advanced. Stack maker writes
    # particle_stack artifacts; CAN classifier writes class_averages
    # artifacts (TaskOutputProcessor handlers in P5b/7b 2026-05-03).
    - name: particle_extraction_out_tasks_queue
      queue_type: particle_extraction
      dir_name: particles
      category: 10
    - name: two_d_classification_out_tasks_queue
      queue_type: two_d_classification
      dir_name: classes
      category: 4
    # Phase 6 (2026-05-03) external template-picker output queue;
    # in-process picker (CoreService/plugins/pp/template_picker)
    # writes via JobService directly so this only fires for the
    # external backend.
    - name: particle_picking_out_tasks_queue
      queue_type: particle_picking
      dir_name: picks
      category: 3

