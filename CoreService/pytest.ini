[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    requires_db: test requires a live MySQL instance (skipped in unit-level CI)
    requires_docker: test requires Docker daemon (skipped in unit-level CI)
    requires_rabbitmq: test requires a live RabbitMQ broker
    characterization: pins current behaviour; failure means an intended contract changed
    integration_e2e: full-stack docker-compose e2e (gated on MAGELLON_E2E_STACK=up)
