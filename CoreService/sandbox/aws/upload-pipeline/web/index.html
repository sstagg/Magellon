<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Magellon MotionCor — Upload Demo</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; max-width: 720px; margin: 2em auto; padding: 0 1em; color: #222; }
  h1 { margin-bottom: 0.2em; }
  .sub { color: #888; font-size: 0.9em; margin-top: 0; }
  label { display: block; margin: 1em 0 0.3em; font-weight: 600; }
  input[type="text"], input[type="password"] { width: 100%; padding: 0.5em; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: monospace; font-size: 0.9em; }
  input[type="file"] { padding: 0.5em 0; }
  button { padding: 0.6em 1.2em; background: #1769aa; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1em; }
  button:disabled { background: #aaa; cursor: not-allowed; }
  #log { white-space: pre-wrap; background: #f5f5f5; padding: 1em; border-radius: 4px; margin-top: 1em; font-family: monospace; font-size: 0.85em; max-height: 400px; overflow-y: auto; }
  #progress { margin-top: 0.5em; font-family: monospace; font-size: 0.9em; }
  .ok { color: #090; font-weight: bold; }
  .err { color: #c00; font-weight: bold; }
  a { color: #1769aa; }
</style>
</head>
<body>
<h1>MotionCor2 Upload → GPU → Download</h1>
<p class="sub">Uploads to a private S3 bucket via presigned URL, triggers AWS Batch, gives you the output download when done.</p>

<label>Lambda Function URL</label>
<input id="apiUrl" type="text" placeholder="https://xxx.lambda-url.us-east-1.on.aws/">

<label>API key</label>
<input id="apiKey" type="password" placeholder="from deploy.sh output or SSM /magellon-gpu-eval/upload-api/key">

<label>Movie file (.tif / .tiff — up to ~2 GB)</label>
<input id="file" type="file" accept=".tif,.tiff,image/tiff">

<p><button id="go" onclick="go()">Upload + Process</button></p>

<div id="progress"></div>
<div id="log"></div>

<script>
const logEl = document.getElementById('log');
const progEl = document.getElementById('progress');

function log(msg, cls) {
  const line = `[${new Date().toLocaleTimeString()}] ${msg}\n`;
  const span = document.createElement('span');
  if (cls) span.className = cls;
  span.textContent = line;
  logEl.appendChild(span);
  logEl.scrollTop = logEl.scrollHeight;
}

async function callApi(body) {
  const url = document.getElementById('apiUrl').value.trim().replace(/\/$/, '') + '/';
  const key = document.getElementById('apiKey').value.trim();
  const r = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'X-Api-Key': key},
    body: JSON.stringify(body),
  });
  const j = await r.json();
  if (!r.ok) throw new Error(j.error || r.statusText);
  return j;
}

async function go() {
  const f = document.getElementById('file').files[0];
  if (!f) { alert('pick a file'); return; }
  const btn = document.getElementById('go');
  btn.disabled = true;
  logEl.textContent = '';
  progEl.textContent = '';

  try {
    log(`file: ${f.name} (${(f.size / 1048576).toFixed(1)} MB)`);

    log('requesting upload URL...');
    const m = await callApi({action: 'mint_upload', filename: f.name, content_type: f.type || 'application/octet-stream'});
    log(`job_id: ${m.job_id}`);

    log('uploading to S3...');
    await uploadWithProgress(m.upload_url, f, m.content_type_required);
    log('upload complete', 'ok');

    log('waiting for job to run on AWS Batch...');
    const start = Date.now();
    let status;
    while (true) {
      await new Promise(r => setTimeout(r, 5000));
      const s = await callApi({action: 'status', job_id: m.job_id});
      status = s.status;
      const sec = Math.round((Date.now() - start) / 1000);
      progEl.textContent = `status: ${status}  (${sec}s)`;
      if (status === 'SUCCEEDED' || status === 'FAILED') break;
    }

    if (status !== 'SUCCEEDED') { log(`job ${status}`, 'err'); btn.disabled = false; return; }
    log('job SUCCEEDED', 'ok');

    log('fetching download URLs...');
    const d = await callApi({action: 'mint_download', job_id: m.job_id});
    logEl.innerHTML += '\n<b>Outputs:</b>\n';
    d.download_urls.forEach(u => {
      const a = document.createElement('a');
      a.href = u.url;
      a.textContent = `${u.key} (${(u.size / 1048576).toFixed(1)} MB)`;
      a.target = '_blank';
      logEl.appendChild(a);
      logEl.appendChild(document.createTextNode('\n'));
    });
  } catch (e) {
    log('ERROR: ' + e.message, 'err');
  }
  btn.disabled = false;
}

function uploadWithProgress(url, file, contentType) {
  return new Promise((resolve, reject) => {
    const x = new XMLHttpRequest();
    x.open('PUT', url);
    if (contentType) x.setRequestHeader('Content-Type', contentType);
    x.upload.onprogress = e => {
      if (e.lengthComputable) {
        progEl.textContent = `upload ${(e.loaded / 1048576).toFixed(1)} / ${(e.total / 1048576).toFixed(1)} MB (${(100 * e.loaded / e.total).toFixed(0)}%)`;
      }
    };
    x.onload = () => x.status < 300 ? resolve() : reject(new Error('PUT failed: ' + x.status + ' ' + x.responseText));
    x.onerror = () => reject(new Error('network error'));
    x.send(file);
  });
}
</script>
</body>
</html>
