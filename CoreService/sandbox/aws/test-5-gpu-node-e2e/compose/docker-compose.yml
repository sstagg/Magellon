services:
  rabbitmq:
    image: rabbitmq:3.13-management
    hostname: rabbitmq
    container_name: magellon-e2e-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: rabbit
      RABBITMQ_DEFAULT_PASS: behd1d2
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 30

  motioncor:
    build:
      context: ./plugin
      args:
        CUDA_IMAGE: nvidia/cuda:12.1.0-runtime-ubuntu22.04
        MOTIONCOR_BINARY: MotionCor2_1.6.4_Cuda121_Mar312023
    image: magellon-motioncor-plugin:e2e
    container_name: magellon-e2e-motioncor
    runtime: nvidia
    environment:
      APP_ENV: production
      MOTIONCOR_BINARY: /app/MotionCor2_1.6.4_Cuda121_Mar312023
      PYTHONUNBUFFERED: "1"
    shm_size: 16gb
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - /data:/data:ro
      - /jobs:/jobs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
