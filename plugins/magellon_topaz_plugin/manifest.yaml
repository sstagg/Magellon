manifest_version: "1.1"

plugin_id: topaz
archive_id: 00000000-0000-7000-8000-000000000000

name: "Topaz — particle picking + denoise"
version: 0.1.0
requires_sdk: ">=2.1,<3.0"

author: "Magellon Team"
license: MIT
description: >
  Topaz CNN-based particle picking (and the companion micrograph
  denoiser). Two categories share one plugin process — backend_id
  reflects the picking surface; the denoise category is served by
  the same image via a second consumer registration.

# Primary category. The plugin process also serves
# ``micrograph_denoising`` via a second consumer registered in main.py.
# Manifest pins the picking surface as the public face.
category: topaz_particle_picking
backend_id: topaz

requires:
  - broker
  - gpfs

# Inference runs on ONNX Runtime. The pinned runtime is CPU-only;
# the plugin auto-detects and uses a GPU when deployed with an
# onnxruntime-gpu build, so a GPU is opportunistic, not required.
resources:
  cpu_cores: 4
  memory_mb: 2048
  gpu_count: 0
  typical_duration_seconds: 30

lifecycle:
  restart_policy: on-failure
  restart_max_retries: 5

install:
  - method: uv
    pyproject: pyproject.toml
    requires:
      - python: ">=3.11"
  - method: docker
    dockerfile: Dockerfile
    build_context: .
    requires:
      - docker_daemon: true

health_check:
  timeout_seconds: 180
  expected_announce: true

ui: null

tags:
  - topaz
  - particle-picking
  - denoise
  - cnn
  - gpu
  - cryo-em
