ENV_TYPE: production
LOCAL_IP_ADDRESS: host.docker.internal
PORT_NUMBER: 8030

MAGELLON_GPFS_PATH: /gpfs
HOST_GPFS_PATH: /gpfs
MAGELLON_HOME_DIR: home

REPLACE_TYPE: none
REPLACE_PATTERN: /gpfs/
REPLACE_WITH: /gpfs/


database_settings:
  DB_Driver: mysql+pymysql
  DB_HOST: mysql
  DB_NAME: magellon01
  DB_PASSWORD: behd1d2
  DB_Port: 3306
  DB_USER: root

rabbitmq_settings:
  HOST_NAME: rabbitmq
  PORT: 5672
  USER_NAME: rabbit
  PASSWORD: behd1d2
  VIRTUAL_HOST: /
  SSL_ENABLED: false
  CONNECTION_TIMEOUT: 30
  PREFETCH_COUNT: 10
  QUEUE_NAME: ctf_out_tasks_queue
  OUT_QUEUE_NAME: ctf_out_tasks_queue
  # MB4.C (2026-04-21): intentionally empty — CoreService's in-process
  # result_consumer (P3) is the sole projector in the default stack.
  # Populating this here caused RMQ to round-robin deliveries between
  # two consumers, so ~50% of CTF/MotionCor results were projected by
  # this plugin's older TaskOutputProcessor (which may be missing the
  # P4 _advance_task_state fix) and ~50% by CoreService's newer copy.
  # Self-hosted deployments that actually want this plugin to process
  # results can re-populate; the default is dormant.
  OUT_QUEUES: []
