manifest_version: "1"

# Identity. plugin_id is the slug (used in subjects, provenance, logs, UI).
# archive_id is auto-regenerated by `magellon-sdk plugin pack` per build —
# the placeholder here is rewritten on every pack.
plugin_id: fft
archive_id: 00000000-0000-7000-8000-000000000000

name: "FFT — magnitude spectrum"
version: 1.0.0
requires_sdk: ">=2.1,<3.0"

author: "Magellon Team"
license: MIT
description: >
  Computes the magnitude spectrum FFT of an input MRC image and writes
  the result as a PNG. Pure-Python via numpy; no external binaries
  required.

# Classification — matches the live runtime manifest's category.
category: fft
backend_id: fft

# What the plugin needs from the deployment. CoreService injects the
# values at install time; the plugin reads them from env / mounted
# config, NOT from this archive.
requires:
  - broker
  - gpfs

# Resource hints — FFT is CPU-only and small.
resources:
  cpu_cores: 1
  memory_mb: 512
  gpu_count: 0
  typical_duration_seconds: 5

# Schema files emitted from the plugin's Pydantic input/output models.
input_schema: schemas/input.json
output_schema: schemas/output.json

# Install methods, in order of preference. uv first (pure Python =
# fastest install, no Docker daemon needed); docker fallback for
# air-gapped hosts that already have the image cached or want
# isolation.
install:
  - method: uv
    pyproject: pyproject.toml
    requires:
      - python: ">=3.11"
  - method: docker
    dockerfile: Dockerfile
    build_context: .
    requires:
      - docker_daemon: true

# Health check — FFT comes up fast.
health_check:
  timeout_seconds: 30
  expected_announce: true

# Schema-driven form for v1; no custom React components yet.
ui: null

tags:
  - fft
  - cryo-em
  - reference
