name: e2e-tests

# Two jobs, same shape as contract-tests.yml:
#
#   e2e-collect     — every push/PR. Verifies the integration test suite
#                     collects + skips cleanly without MAGELLON_E2E_STACK=up.
#                     Catches fixture / helper / SDK regressions early
#                     without paying the ~5-minute boot tax on every PR.
#   e2e-integration — nightly (cron) + on-demand (workflow_dispatch).
#                     Brings up the full docker-compose stack (NO FFT
#                     container — the tests install it themselves via
#                     the admin endpoint), builds the FFT .mpn archive,
#                     runs the e2e suite. Too slow (~5-min boot) to gate
#                     every PR; the nightly run is the safety net.
#
# Phases 0-4 unit tests run via lint.yml's pytest job; this workflow
# covers Waves 2 + 3 (install/lifecycle/dispatch + logs/upgrade) at
# the end-to-end seam.

on:
  push:
    branches: [main]
    paths:
      - 'CoreService/**'
      - 'magellon-sdk/**'
      - '.github/workflows/e2e-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'CoreService/**'
      - 'magellon-sdk/**'
      - '.github/workflows/e2e-tests.yml'
  workflow_dispatch:
  schedule:
    # Nightly at 06:00 UTC (C.3) — the live-stack e2e safety net.
    - cron: "0 6 * * *"

jobs:
  e2e-collect:
    name: integration suite (collect-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install collect-only deps
        working-directory: CoreService
        # Only what `pytest --collect-only` actually needs to resolve
        # imports + fixtures across tests/integration/. We deliberately
        # skip requirements.txt — none of these tests import the heavy
        # chain (sqlalchemy/casbin/lxml/psycopg2/airflow), and a
        # silent || true masked real install failures. The nightly
        # live-stack job below still does the full install.
        run: |
          pip install -e ../magellon-sdk[rabbitmq,nats,logging,config]
          # cloudevents<2 pin: support/events/publisher.py imports
          # cloudevents.http (removed in cloudevents 2.x).
          pip install pytest pytest-asyncio httpx fastapi uvicorn "cloudevents<2"
      - name: pytest --collect-only (imports + fixtures resolve)
        working-directory: CoreService
        run: |
          # Verifies every integration test module imports cleanly and
          # pytest can build its collection graph. We deliberately don't
          # execute: the suite is broker-gated and a no-op run gives a
          # false sense of coverage. The nightly e2e-integration job
          # is the actual prove-it run.
          pytest tests/integration/ \
            --ignore=tests/integration/test_fft_full_stack_e2e.py \
            --collect-only -q
          # Regression: each Wave 2/3 e2e file must contain at least
          # one test (catches accidental file deletion).
          for f in \
            test_install_lifecycle_dispatch_e2e.py \
            test_sync_path_canonicalization_e2e.py \
            test_install_from_hub_e2e.py \
            test_pause_during_task_e2e.py \
            test_plugin_logs_e2e.py \
            test_plugin_upgrade_e2e.py; do
            test $(grep -c "^def test_" "tests/integration/$f") -ge 1 || {
              echo "::error::tests/integration/$f has no test_ functions" >&2
              exit 1
            }
          done

  e2e-integration:
    name: integration suite (live stack)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test deps
        run: |
          pip install -e magellon-sdk[rabbitmq,nats,logging,config]
          pip install -r CoreService/requirements.txt || true
          pip install pytest httpx pillow numpy "python-socketio[asyncio_client]" aiohttp pytest-asyncio sqlalchemy pymysql requests
      - name: Build FFT .mpn fixture
        run: bash CoreService/scripts/build_fft_mpn.sh
      - name: Boot docker-compose stack (no plugin containers)
        working-directory: Docker
        run: |
          # The e2e wave tests install FFT via the admin endpoint, so
          # we only need the infra services (DB + brokers + CoreService).
          docker compose up -d mysql rabbitmq nats backend
          # Wait for CoreService /health.
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8000/health > /dev/null 2>&1; then break; fi
            sleep 2
          done
      - name: Run e2e suite
        working-directory: CoreService
        env:
          MAGELLON_E2E_STACK: up
          MAGELLON_BACKEND_URL: http://127.0.0.1:8000
          MAGELLON_E2E_DB_URL: "mysql+pymysql://root:behd1d2@127.0.0.1:3306/magellon01"
          MAGELLON_RMQ_URL: "amqp://guest:guest@127.0.0.1:5672/"
          MAGELLON_NATS_URL: "nats://127.0.0.1:4222"
          MAGELLON_GPFS_HOST_PATH: /tmp/magellon/gpfs
          MAGELLON_HOME_DIR: /tmp/magellon/home
        run: |
          mkdir -p /tmp/magellon/gpfs /tmp/magellon/home
          pytest tests/integration/ \
            --ignore=tests/integration/test_fft_full_stack_e2e.py \
            -v --tb=short -m integration_e2e
      - name: Tear down
        if: always()
        working-directory: Docker
        run: docker compose down -v
      - name: Upload CoreService logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-logs
          path: |
            CoreService/app.log
            CoreService/*.log
          if-no-files-found: ignore
          retention-days: 7
