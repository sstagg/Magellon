name: lint

# Enforces the layering invariants from ARCHITECTURE_PRINCIPLES.md §3:
#  - MB6.3: "no pika outside the binder" — ruff banned-api rule in
#    magellon-sdk/pyproject.toml + CoreService/pyproject.toml.
#  - C.1: "single Socket.IO producer" — grep gate below.
# This workflow makes both blocking on every push and PR.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-sdk:
    name: ruff / magellon-sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: ruff check magellon-sdk
        working-directory: magellon-sdk
        run: ruff check src tests

  lint-core-service:
    name: ruff / CoreService
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: ruff check CoreService
        working-directory: CoreService
        run: ruff check . --exclude venv --exclude __pycache__

  socketio-single-producer:
    # Phase C.1: enforce the "single Socket.IO producer" invariant from
    # ARCHITECTURE_PRINCIPLES.md §3. core/socketio_server.py owns the
    # server object; every other module emits UI events through its
    # emit_* helpers. sio.emit is a method call, not an import, so a
    # ruff banned-api rule can't catch it — a grep gate does.
    name: socketio / single producer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No sio.emit outside core/socketio_server.py
        working-directory: CoreService
        run: |
          hits=$(grep -rn --include='*.py' \
            --exclude-dir=venv --exclude-dir=.venv --exclude-dir=__pycache__ \
            'sio\.emit' . \
            | grep -v '^\./core/socketio_server\.py:' \
            | grep -v '/tests/' || true)
          if [ -n "$hits" ]; then
            echo "::error::Direct sio.emit outside core/socketio_server.py — route UI events through its emit_* helpers (ARCHITECTURE_PRINCIPLES.md §3, single Socket.IO producer)."
            echo "$hits"
            exit 1
          fi
          echo "OK — core/socketio_server.py is the sole Socket.IO producer."
