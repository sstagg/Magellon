name: Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  repo-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python scripts/check_repo_hygiene.py

  core-ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install ruff
      - run: ruff check .
        working-directory: CoreService

  sdk-ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install ruff
      - run: ruff check .
        working-directory: magellon-sdk

  sdk-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
        working-directory: magellon-sdk
      - run: pytest
        working-directory: magellon-sdk

  react-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: magellon-react-app/pnpm-lock.yaml
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
        working-directory: magellon-react-app
      - run: pnpm run type-check
        working-directory: magellon-react-app
      - run: pnpm run lint
        working-directory: magellon-react-app
