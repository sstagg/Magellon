services:


  mysql:
    image: mysql:8.2.0
    container_name: magellon-mysql_container
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ${MAGELLON_ROOT_DIR}/services/mysql/data:/var/lib/mysql:rw
      - ${MAGELLON_ROOT_DIR}/services/mysql/conf:/etc/mysql/conf
      - ${MAGELLON_ROOT_DIR}/services/mysql/init/magellon01db.sql:/docker-entrypoint-initdb.d/magellon01db.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci  --lower-case-table-names=1
    restart: always
    user: "999:999"
    ports:
      - "127.0.0.1:${MYSQL_PORT}:3306"
    networks:
      magellon-network:
        ipv4_address: 172.16.238.7

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    container_name: magellon-dragonfly-container
    restart: unless-stopped
    volumes:
      - dragonfly-data:/data
    ports:
      - "127.0.0.1:${DRAGONFLY_PORT:-6379}:6379"
    environment:
      - DRAGONFLY_REQUIREPASS=${DRAGONFLY_PASSWORD}
    networks:
      magellon-network:
        ipv4_address: 172.16.238.10
    ulimits:
      memlock: -1
    command: --logtostdout=true
    mem_limit: 2G
    cpus: 1.0


  nats:
    image: nats:latest
    command: -js  # Enable JetStream
    container_name: magellon-nats-container
    ports:
      - "127.0.0.1:4222:4222"  # Client connections
      - "127.0.0.1:8222:8222"  # HTTP monitoring
    volumes:
      - nats-data:/data  # For JetStream storage
    networks:
      magellon-network:
        ipv4_address: 172.16.238.13
    restart: unless-stopped


  rabbitmq:
    image: rabbitmq:management-alpine
    #    image: rabbitmq:latest
    #    image: rabbitmq:3-management
    hostname: my-rabbit
    restart: unless-stopped
    container_name: magellon-rabbitmq-container
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq  # Persist data
    ports:
      - "127.0.0.1:${RABBITMQ_PORT}:5672"
      - "127.0.0.1:${RABBITMQ_MANAGEMENT_PORT}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    networks:
      magellon-network:
        ipv4_address: 172.16.238.8

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    container_name: magellon-prometheus-container
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ${MAGELLON_ROOT_DIR}/services/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    networks:
      magellon-network:
        ipv4_address: 172.16.238.11

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    container_name: magellon-grafana-container
    depends_on:
      - prometheus
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - 'grafana_storage:/var/lib/grafana'
      - '${MAGELLON_ROOT_DIR}/services/grafana/grafana.db:/tmp/grafana.db'
    command: |
      sh -c "cp /tmp/grafana.db /var/lib/grafana/grafana.db && /run.sh"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER_NAME}      # Default admin username
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_USER_PASS}    # Default admin password
    networks:
      magellon-network:
        ipv4_address: 172.16.238.12

  backend:
    build:
      # Repo root as context so the editable SDK install
      # (`-e ../magellon-sdk` in CoreService/requirements.txt) resolves.
      context: ..
      dockerfile: CoreService/Dockerfile
    image: magellon-core-image
    container_name: magellon-core-container
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MAGELLON_BACKEND_PORT}:80"
    volumes:
      - ${MAGELLON_HOME_PATH}:/magellon
      - ${MAGELLON_GPFS_PATH}:/gpfs
      - ${MAGELLON_JOBS_PATH}:/jobs
    environment:
      - APP_ENV=production
      - RUN_ENV=docker
      - GPFS_PATH=${MAGELLON_GPFS_PATH}
      - HOME_PATH=${MAGELLON_HOME_PATH}
      - JOBS_PATH=${MAGELLON_JOBS_PATH}
      - RABBITMQ_HOST=rabbitmq
      - DRAGONFLY_HOST=dragonfly
      - DRAGONFLY_PORT=6379
      - DRAGONFLY_PASSWORD=${DRAGONFLY_PASSWORD:-password}
      # Step-event forwarders (RMQ + NATS): persist lifecycle envelopes
      # to job_event AND drive JobManager state transitions for
      # message-driven plugins (FFT/CTF/MotionCor).
      - MAGELLON_RMQ_STEP_EVENTS_FORWARDER=1
      - MAGELLON_STEP_EVENTS_FORWARDER=1
      - NATS_URL=nats://nats:4222
    networks:
      magellon-network:
        ipv4_address: 172.16.238.15

  web:
    build:
      context: ../magellon-react-app
      dockerfile: Dockerfile
      args:
        API_URL: http://localhost:${MAGELLON_BACKEND_PORT}
    image: magellon-react-app-image
    container_name: magellon-react-app-container
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MAGELLON_FRONTEND_PORT}:80"
    environment:
      - BACKEND_HOST=backend
      - API_URL=http://localhost:${MAGELLON_BACKEND_PORT}
    networks:
      magellon-network:
        ipv4_address: 172.16.238.16


  magellon_result_plugin:
    build:
      context: ../plugins/magellon_result_processor
      dockerfile: Dockerfile
    image: magellon_result_plugin_image
    container_name: magellon_result_container
    environment:
      - APP_ENV=production
      - RUN_ENV=docker
      - GPFS_ROOT=${MAGELLON_GPFS_PATH}
      - HOME_PATH=${MAGELLON_HOME_PATH}
      - DRAGONFLY_HOST=dragonfly
      - DRAGONFLY_PORT=6379
      - DRAGONFLY_PASSWORD=${DRAGONFLY_PASSWORD:-password}
    volumes:
      - ${MAGELLON_GPFS_PATH}:/gpfs
      - ${MAGELLON_JOBS_PATH}:/jobs
      - ${MAGELLON_HOME_PATH}:/magellon
    ports:
      - "127.0.0.1:${MAGELLON_RESULT_PLUGIN_PORT}:80"
    networks:
      magellon-network:
        ipv4_address: 172.16.238.20

  magellon_ctf_plugin:
    build:
      context: ../plugins/magellon_ctf_plugin
      dockerfile: Dockerfile
    image: magellon_ctf_plugin_image
    container_name: magellon_ctf_plugin_container
    environment:
      - APP_ENV=production
      - RUN_ENV=docker
      - GPFS_ROOT=${MAGELLON_GPFS_PATH}
      - JOBS_PATH=${MAGELLON_JOBS_PATH}
      - DRAGONFLY_HOST=dragonfly
      - DRAGONFLY_PORT=6379
      - DRAGONFLY_PASSWORD=${DRAGONFLY_PASSWORD:-password}
    volumes:
      - ${MAGELLON_HOME_PATH}:/magellon
      - ${MAGELLON_GPFS_PATH}:/gpfs
      - ${MAGELLON_JOBS_PATH}:/jobs
    ports:
      - "127.0.0.1:${MAGELLON_CTF_PLUGIN_PORT}:80"
    networks:
      magellon-network:
        ipv4_address: 172.16.238.21

  magellon_motioncor_plugin:
    build:
      context: ../plugins/magellon_motioncor_plugin
      dockerfile: Dockerfile
      args:
        CUDA_IMAGE: ${CUDA_IMAGE}
        MOTIONCOR_BINARY: ${MOTIONCOR_BINARY}
    image: magellon_motioncor_plugin_image
    container_name: magellon_motioncor_plugin_containerf
    environment:
      - APP_ENV=production
      - RUN_ENV=docker
      - GPFS_ROOT=${MAGELLON_GPFS_PATH}
      - JOBS_PATH=${MAGELLON_JOBS_PATH}
      - CUDA_IMAGE=${CUDA_IMAGE}
      - MOTIONCOR_BINARY=${MOTIONCOR_BINARY}
      - DRAGONFLY_HOST=dragonfly
      - DRAGONFLY_PORT=6379
      - DRAGONFLY_PASSWORD=${DRAGONFLY_PASSWORD:-password}
    volumes:
      - ${MAGELLON_HOME_PATH}:/magellon
      - ${MAGELLON_GPFS_PATH}:/gpfs
      - ${MAGELLON_JOBS_PATH}:/jobs
    ports:
      - "127.0.0.1:${MAGELLON_MOTIONCOR_PLUGIN_PORT}:80"
    networks:
      magellon-network:
        ipv4_address: 172.16.238.22
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  magellon_fft_plugin:
    build:
      # Repo root as context so the plugin's editable SDK install
      # (`-e ../../magellon-sdk[...]`) resolves at build time.
      context: ..
      dockerfile: plugins/magellon_fft_plugin/Dockerfile
    image: magellon_fft_plugin_image
    container_name: magellon_fft_plugin_container
    environment:
      - APP_ENV=production
      - RUN_ENV=docker
      - GPFS_ROOT=${MAGELLON_GPFS_PATH}
      - JOBS_PATH=${MAGELLON_JOBS_PATH}
      # Step-event publishing — the plugin emits started/progress/
      # completed envelopes onto NATS so the backend's projector can
      # transition image_job state. Without these the plugin still
      # processes RMQ messages but nothing reaches job_event / Socket.IO.
      - MAGELLON_STEP_EVENTS_ENABLED=1
      - MAGELLON_STEP_EVENTS_RMQ=1
      - NATS_URL=nats://nats:4222
    volumes:
      - ${MAGELLON_HOME_PATH}:/magellon
      - ${MAGELLON_GPFS_PATH}:/gpfs
      - ${MAGELLON_JOBS_PATH}:/jobs
    ports:
      - "127.0.0.1:${MAGELLON_FFT_PLUGIN_PORT}:80"
    networks:
      magellon-network:
        ipv4_address: 172.16.238.23
    depends_on:
      - rabbitmq
      - nats

  magellon_ptolemy_plugin:
    build:
      # Repo root as context for the editable SDK install.
      context: ..
      dockerfile: plugins/magellon_ptolemy_plugin/Dockerfile
    image: magellon_ptolemy_plugin_image
    container_name: magellon_ptolemy_plugin_container
    environment:
      - APP_ENV=production
      - RUN_ENV=docker
      - GPFS_ROOT=${MAGELLON_GPFS_PATH}
      - JOBS_PATH=${MAGELLON_JOBS_PATH}
      # Step-event publishing — plugin emits started/progress/completed
      # onto RMQ + NATS; CoreService's step-event forwarder projects them
      # into job_event rows and fans out on Socket.IO.
      - MAGELLON_STEP_EVENTS_ENABLED=1
      - MAGELLON_STEP_EVENTS_RMQ=1
      - NATS_URL=nats://nats:4222
    volumes:
      - ${MAGELLON_HOME_PATH}:/magellon
      - ${MAGELLON_GPFS_PATH}:/gpfs
      - ${MAGELLON_JOBS_PATH}:/jobs
    ports:
      - "127.0.0.1:${MAGELLON_PTOLEMY_PLUGIN_PORT:-8038}:80"
    networks:
      magellon-network:
        ipv4_address: 172.16.238.24
    depends_on:
      - rabbitmq
      - nats

  magellon_topaz_plugin:
    build:
      # Repo root as context for the editable SDK install.
      context: ..
      dockerfile: plugins/magellon_topaz_plugin/Dockerfile
    image: magellon_topaz_plugin_image
    container_name: magellon_topaz_plugin_container
    environment:
      - APP_ENV=production
      - RUN_ENV=docker
      - GPFS_ROOT=${MAGELLON_GPFS_PATH}
      - JOBS_PATH=${MAGELLON_JOBS_PATH}
      # Step-event publishing — plugin emits started/progress/completed
      # onto RMQ + NATS; CoreService's step-event forwarder projects them
      # into job_event rows and fans out on Socket.IO.
      - MAGELLON_STEP_EVENTS_ENABLED=1
      - MAGELLON_STEP_EVENTS_RMQ=1
      - NATS_URL=nats://nats:4222
    volumes:
      - ${MAGELLON_HOME_PATH}:/magellon
      - ${MAGELLON_GPFS_PATH}:/gpfs
      - ${MAGELLON_JOBS_PATH}:/jobs
    ports:
      - "127.0.0.1:${MAGELLON_TOPAZ_PLUGIN_PORT:-8039}:80"
    networks:
      magellon-network:
        ipv4_address: 172.16.238.25
    depends_on:
      - rabbitmq
      - nats

  # ------------------------------------------------------------------------
  # 2026-05-04 reviewer-flagged Medium #8: extraction / classification /
  # external picker plugins were missing from the compose stack so they
  # never announced. Three new plugin services below; same env / volume
  # / network pattern as the four existing ones.
  # ------------------------------------------------------------------------

  magellon_stack_maker_plugin:
    # Phase 5 (2026-05-03): PARTICLE_EXTRACTION (code 10), backend_id
    # ``stack-maker``. Boxes particles from a micrograph given picker
    # coordinates; emits .mrcs + .star + companion .json. CPU-only.
    build:
      context: ..
      dockerfile: plugins/magellon_stack_maker_plugin/Dockerfile
    image: magellon_stack_maker_plugin_image
    container_name: magellon_stack_maker_plugin_container
    environment:
      - APP_ENV=production
      - RUN_ENV=docker
      - GPFS_ROOT=${MAGELLON_GPFS_PATH}
      - JOBS_PATH=${MAGELLON_JOBS_PATH}
      - MAGELLON_STEP_EVENTS_ENABLED=1
      - MAGELLON_STEP_EVENTS_RMQ=1
      - NATS_URL=nats://nats:4222
    volumes:
      - ${MAGELLON_HOME_PATH}:/magellon
      - ${MAGELLON_GPFS_PATH}:/gpfs
      - ${MAGELLON_JOBS_PATH}:/jobs
    ports:
      - "127.0.0.1:${MAGELLON_STACK_MAKER_PLUGIN_PORT:-8040}:80"
    networks:
      magellon-network:
        ipv4_address: 172.16.238.26
    depends_on:
      - rabbitmq
      - nats

  magellon_can_classifier_plugin:
    # Phase 7 (2026-05-03 + Phase 7b vendor): TWO_D_CLASSIFICATION
    # (code 4), backend_id ``can-classifier``. CAN topology + MRA on a
    # particle stack; emits class averages + assignments + FRC.
    # Uses CPU torch by default (compute_backend=cpu in engine_opts);
    # switch the FROM line in the Dockerfile to nvidia/cuda:12.1-runtime
    # for production GPU deployments.
    build:
      context: ..
      dockerfile: plugins/magellon_can_classifier_plugin/Dockerfile
    image: magellon_can_classifier_plugin_image
    container_name: magellon_can_classifier_plugin_container
    environment:
      - APP_ENV=production
      - RUN_ENV=docker
      - GPFS_ROOT=${MAGELLON_GPFS_PATH}
      - JOBS_PATH=${MAGELLON_JOBS_PATH}
      - MAGELLON_STEP_EVENTS_ENABLED=1
      - MAGELLON_STEP_EVENTS_RMQ=1
      - NATS_URL=nats://nats:4222
    volumes:
      - ${MAGELLON_HOME_PATH}:/magellon
      - ${MAGELLON_GPFS_PATH}:/gpfs
      - ${MAGELLON_JOBS_PATH}:/jobs
    ports:
      - "127.0.0.1:${MAGELLON_CAN_CLASSIFIER_PLUGIN_PORT:-8041}:80"
    networks:
      magellon-network:
        ipv4_address: 172.16.238.27
    depends_on:
      - rabbitmq
      - nats

  magellon_template_picker_plugin:
    # Phase 6 (2026-05-03): external broker-resident PARTICLE_PICKING
    # (code 3), backend_id ``template-picker``. Coexists with the
    # in-process pp/template_picker; dispatcher routes via
    # TaskMessage.target_backend.
    build:
      context: ..
      dockerfile: plugins/magellon_template_picker_plugin/Dockerfile
    image: magellon_template_picker_plugin_image
    container_name: magellon_template_picker_plugin_container
    environment:
      - APP_ENV=production
      - RUN_ENV=docker
      - GPFS_ROOT=${MAGELLON_GPFS_PATH}
      - JOBS_PATH=${MAGELLON_JOBS_PATH}
      - MAGELLON_STEP_EVENTS_ENABLED=1
      - MAGELLON_STEP_EVENTS_RMQ=1
      - NATS_URL=nats://nats:4222
    volumes:
      - ${MAGELLON_HOME_PATH}:/magellon
      - ${MAGELLON_GPFS_PATH}:/gpfs
      - ${MAGELLON_JOBS_PATH}:/jobs
    ports:
      - "127.0.0.1:${MAGELLON_TEMPLATE_PICKER_PLUGIN_PORT:-8042}:80"
    networks:
      magellon-network:
        ipv4_address: 172.16.238.28
    depends_on:
      - rabbitmq
      - nats

volumes:
  # Named volumes for all services
  rabbitmq-data: { }
  nats-data: { }
  postgres_data: { }
  grafana_storage: { }
  dragonfly-data: { }  # Added volume for Dragonfly
  app_data:  # Define a named volume for application data
  cache:
    driver: local

networks:
  magellon-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.16.238.0/24