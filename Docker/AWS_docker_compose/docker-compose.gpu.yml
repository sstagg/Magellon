# GPU stack – runs on the dedicated GPU EC2 spot instance.
# Contains ONLY the MotionCor plugin.
#
# All broker/cache connections point to the main instance's private IP
# via environment variables and a mounted settings_prod.yml override.
#
# The magellon SDK reads RabbitMQ config from settings_prod.yml (YAML),
# so we mount the generated file from /opt/magellon-gpu/settings_prod.yml.

services:

  magellon_motioncor_plugin:
    build:
      context: ../../plugins/magellon_motioncor_plugin
      dockerfile: Dockerfile
      args:
        CUDA_IMAGE: ${CUDA_IMAGE}
        MOTIONCOR_BINARY: ${MOTIONCOR_BINARY}
    image: magellon_motioncor_plugin_image
    container_name: magellon_motioncor_plugin_container
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - RUN_ENV=docker
      - GPFS_ROOT=${MAGELLON_GPFS_PATH}
      - JOBS_PATH=${MAGELLON_JOBS_PATH}
      - CUDA_IMAGE=${CUDA_IMAGE}
      - MOTIONCOR_BINARY=${MOTIONCOR_BINARY}
      # Dragonfly on main instance
      - DRAGONFLY_HOST=${DRAGONFLY_HOST}
      - DRAGONFLY_PORT=${DRAGONFLY_PORT:-6379}
      - DRAGONFLY_PASSWORD=${DRAGONFLY_PASSWORD}
      # RabbitMQ on main instance (env-level override; SDK also reads settings_prod.yml)
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      # NATS on main instance
      - NATS_URL=${NATS_URL}
    volumes:
      - ${MAGELLON_HOME_PATH}:/magellon
      - ${MAGELLON_GPFS_PATH}:/gpfs
      - ${MAGELLON_JOBS_PATH}:/jobs
      # SDK settings override – generated by user_data_gpu.sh
      - /opt/magellon-gpu/settings_prod.yml:/app/settings_prod.yml:ro
    ports:
      - "127.0.0.1:${MAGELLON_MOTIONCOR_PLUGIN_PORT:-8036}:80"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION}
        awslogs-group: /magellon/prod/motioncor-plugin
        awslogs-stream: motioncor

networks:
  default:
    driver: bridge
