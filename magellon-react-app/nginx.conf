server {
  listen 80;
  sendfile on;
  default_type application/octet-stream;

  gzip on;
  gzip_http_version 1.1;
  gzip_disable      "MSIE [1-6]\.";
  gzip_min_length   256;
  gzip_vary         on;
  gzip_proxied      expired no-cache no-store private auth;
  gzip_types        text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;
  gzip_comp_level   9;

  root /usr/share/nginx/html;

  # ── Static React app ─────────────────────────────────────────────────────────
  location / {
    try_files $uri $uri/ /index.html;
  }

  # ── WebSocket (Socket.IO) ─────────────────────────────────────────────────────
  location /socket.io/ {
    proxy_pass         http://backend:8000/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host       $host;
    # Replace browser Origin with localhost so the backend's CORS check passes.
    # All traffic reaches the backend through this nginx proxy — the browser
    # has no direct path to port 8000, so spoofing origin here is safe.
    proxy_set_header   Origin     "http://127.0.0.1";
    proxy_set_header   X-Real-IP  $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
  }

  # ── Backend API paths ─────────────────────────────────────────────────────────
  # All non-static routes the CoreService registers (see main.py include_router calls).
  location ~ ^/(health|db|export|image|web|graphs|io|pipelines|artifacts|auth|plugins|cancellation|admin|deployment|dispatch|particle-picking|system|graphql)(/|$) {
    proxy_pass         http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 300;
    proxy_send_timeout 300;
    client_max_body_size 500m;
  }
}
